# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      - name: Add GitHub Package source
        run: |
          dotnet nuget add source \
          "https://nuget.pkg.github.com/ElizavetaLevina/index.json" \
          --name github \
          --username ElizavetaLevina \
          --password ${{ secrets.GITHUB_TOKEN }} \
          --store-password-in-clear-text

      - name: Start PostgreSQL
        run: |
          docker run -d \
            --name postgres \
            -e POSTGRES_USER=test_user \
            -e POSTGRES_PASSWORD=test_password \
            -e POSTGRES_DB=test_db \
            -p 5432:5432 \
            postgres:17.6

      - name: Start Keycloak
        run: |
          docker run -d \
            --name keycloak \
            -p 8090:8090 \
            -v $(pwd)/realm.json:/opt/keycloak/data/import/realm.json \
            -e KEYCLOAK_ADMIN=admin \
            -e KEYCLOAK_ADMIN_PASSWORD=admin \
            quay.io/keycloak/keycloak:latest \
            start-dev --import-realm --http-port=8090

      - name: Wait for Keycloak
        run: |
          for i in {1..30}; do
            curl -s http://localhost:8090 && break
            sleep 1
          done
      
      - name: Restore dependencies
        run: dotnet restore
      
      - name: Build
        run: dotnet build --no-restore
        
      - name: Run API (debug)
        run: |
          dotnet run --project BackendService.API --urls "http://localhost:5000" &
          sleep 15
        env:
          ASPNETCORE_ENVIRONMENT: Development
          ConnectionStrings__DefaultConnection: "Host=localhost;Database=test_db;Username=test_user;Password=test_password"
          Keycloak__Authority: "http://localhost:8090/realms/master"
          API_KEY: "test-key"
          BASE_API_URL: "http://test"
          
      - name: Run tests
        run: dotnet test --no-build --verbosity normal
