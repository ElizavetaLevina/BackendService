# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    
    env:
          ASPNETCORE_ENVIRONMENT: Development
          Keycloak__Authority: "http://localhost:8090/realms/auth-dev"
          API_KEY: "test-key"
          BASE_API_URL: "http://test"

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      - name: Add GitHub Package source
        run: |
          dotnet nuget add source \
          "https://nuget.pkg.github.com/ElizavetaLevina/index.json" \
          --name github \
          --username ElizavetaLevina \
          --password ${{ secrets.GITHUB_TOKEN }} \
          --store-password-in-clear-text

      - name: Start PostgreSQL
        run: |
          docker run -d \
            --name postgres \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_DB=backend_service_tests \
            -p 5430:5432 \
            postgres:17.6

      - name: Wait for PostgreSQL
        run: |
          for i in {1..30}; do
            docker exec postgres pg_isready -U postgres && break || sleep 1
          done

      - name: Start Keycloak
        run: |
          docker run -d \
            --name keycloak \
            -p 8090:8090 \
            -v $(pwd)/realm.json:/opt/keycloak/data/import/realm.json \
            -e KEYCLOAK_ADMIN=admin \
            -e KEYCLOAK_ADMIN_PASSWORD=admin \
            quay.io/keycloak/keycloak:latest \
            start-dev --import-realm --http-port=8090

      - name: Wait for Keycloak
        run: |
          for i in {1..30}; do
            curl -s http://localhost:8090 && break
            sleep 1
          done
      
      - name: Restore dependencies
        run: dotnet restore
      
      - name: Build
        run: dotnet build --no-restore

      - name: Install dotnet ef
        run: dotnet tool install --global dotnet-ef
        
      - name: Apply migrations
        run: |
          dotnet ef database update \
            -p BackendService.DAL \
            -s BackendService.API
        env:
          ConnectionStrings__DefaultConnection: "Host=localhost;Port=5430;Database=backend_service_tests;Username=postgres;Password=postgres"
            
      - name: Check tables in test DB
        run: |
          docker exec postgres psql -U postgres -d backend_service_tests -c "\dt"
        
      - name: Run tests
        run: dotnet test --no-build --verbosity normal
